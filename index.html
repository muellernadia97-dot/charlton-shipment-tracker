
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Charlton — Shipment Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F0EB;min-height:100vh;max-width:480px;margin:0 auto}
.header{background:#1C1C1C;padding:20px 16px 0;position:sticky;top:0;z-index:50}
h1{font-size:18px;font-weight:500;color:#fff;letter-spacing:-0.3px}
.header p{font-size:12px;color:#888;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.live{background:#1a3a1a;color:#4ade80;font-size:9px;padding:2px 6px;border-radius:3px;margin-left:6px;font-weight:500}
.tabs{display:flex}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:500;text-align:center;color:#666;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#fff;border-bottom-color:#B85C3A}
.content{padding:12px}
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-btn{font-size:11px;padding:5px 10px;border-radius:20px;border:0.5px solid #ccc;background:#fff;color:#555;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:#1C1C1C;color:#fff;border-color:#1C1C1C}
.section-meta{font-size:10px;color:#888;font-weight:500;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:10px}

/* Fabric / Trims cards */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border:0.5px solid rgba(0,0,0,0.06)}
.card.placeholder{opacity:0.6}
.item-img{width:54px;height:54px;border-radius:10px;flex-shrink:0;border:0.5px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;font-size:24px;background:#F9F6F2}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500;color:#1C1C1C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:#888;margin-top:1px;font-family:monospace}
.tracking-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.tracking-chip{font-size:10px;font-family:monospace;color:#666;background:#F5F0EB;padding:4px 7px;border-radius:6px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tracking-chip.empty{color:#aaa;font-style:italic;font-family:-apple-system,sans-serif}
.pill{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pill-placeholder{background:#F0EDE8;color:#999}
.pill-ordered{background:#EEEDFE;color:#3C3489}
.pill-transit{background:#E6F1FB;color:#0C447C}
.pill-customs{background:#FBEAF0;color:#72243E}
.pill-delivery{background:#FAEEDA;color:#633806}
.pill-delivered{background:#EAF3DE;color:#27500A}
.progress-bar{height:3px;border-radius:2px;background:#EEE;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px}
.eta-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.eta{font-size:10px;color:#999}
.action-btns{display:flex;gap:6px}
.btn{font-size:10px;padding:4px 10px;border:0.5px solid #ddd;border-radius:6px;background:none;color:#666;cursor:pointer;font-family:inherit}
.btn-track{border-color:#B85C3A;color:#B85C3A;font-weight:500}
.btn-add{border-color:#B85C3A;color:#B85C3A;font-weight:500}

/* Sample cards — expanded layout */
.sample-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:0.5px solid rgba(0,0,0,0.06)}
.sample-header{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.sample-icon{width:50px;height:50px;border-radius:10px;flex-shrink:0;border:0.5px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;font-size:22px;background:#F9F6F2}
.sample-title{flex:1;min-width:0}

.sample-code{font-size:11px;color:#888;font-family:monospace;margin-top:2px}
.sample-factory{font-size:11px;color:#B85C3A;margin-top:2px}
.shipment-rows{border-top:0.5px solid #F0EDE8;padding-top:12px;display:flex;flex-direction:column;gap:10px}
.shipment-type{display:flex;flex-direction:column;gap:6px}
.type-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.shipment-line{display:flex;align-items:center;gap:6px}
.shipment-chip{font-size:10px;font-family:monospace;color:#666;background:#F5F0EB;padding:4px 7px;border-radius:6px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shipment-chip.empty{color:#bbb;font-style:italic;font-family:-apple-system,sans-serif;font-size:10px}
.shipment-progress{height:2px;border-radius:2px;background:#EEE;margin-top:4px;overflow:hidden}
.shipment-fill{height:100%;border-radius:2px}
.shipment-eta{font-size:10px;color:#aaa;margin-top:3px}

.add-btn{width:100%;padding:13px;border:0.5px dashed #ccc;border-radius:14px;background:none;color:#888;font-size:13px;cursor:pointer;margin-top:4px;font-family:inherit}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:16px;font-weight:500;margin-bottom:4px;color:#1C1C1C}
.modal .modal-sub{font-size:12px;color:#B85C3A;margin-bottom:18px;font-weight:500}
.field{margin-bottom:14px}
.field label{font-size:12px;color:#666;display:block;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;background:#fff;color:#1C1C1C;font-size:14px;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:#B85C3A}
.section-divider{font-size:11px;font-weight:600;color:#B85C3A;text-transform:uppercase;letter-spacing:0.5px;margin:18px 0 12px;padding-top:14px;border-top:0.5px solid #F0EDE8}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:12px;border:0.5px solid #ddd;border-radius:12px;background:none;color:#666;font-size:14px;cursor:pointer;font-family:inherit}
.btn-save{flex:1;padding:12px;border:none;border-radius:12px;background:#1C1C1C;color:#fff;font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
</style>
</head>

<script>
const SHEETS_KEY = 'AIzaSyD1aXZwA7bsxMYjYq465UoxvruwmX2uw10';
const SHEET_ID   = '17cRJs6LPWmqPfGh3M3Frsdjipcix5iVA';
const JSONBIN_KEY= '$2a$10$8k/FFS8g3eUYZAhoEAk8R..d2gXZ7U55cOi6okeg05KLslsyEM.12';
const JSONBIN_URL= 'https://api.jsonbin.io/v3/b';

let STYLES = [];
let binId  = null;
let cloudData = {};

async function init(){
  document.getElementById('main-content').innerHTML =
    '<div style="text-align:center;padding:40px 20px;color:#aaa;font-size:13px"><div style="width:24px;height:24px;border:2px solid #eee;border-top-color:#B85C3A;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>Loading styles from sheet...</div>';
  await Promise.all([loadSheet(), loadCloud()]);
  render();
}

async function loadSheet(){
  try{
    // Use Google Sheets public CSV export — no API key needed, just requires sheet to be public
    const GID = '0'; // Range Tracker tab gid (first tab)
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Range%20Tracker&range=A1:BU54`;
    const res = await fetch(url);
    if(!res.ok){ showErr(`Could not load sheet (${res.status}). Make sure it is shared publicly — File → Share → Anyone with the link → Viewer.`); return; }
    const text = await res.text();
    // Parse CSV
    const rows = parseCSV(text);
    if(rows.length < 5){ showErr('Sheet loaded but not enough rows found.'); return; }
    const ICONS = {Bottom:'👖',Top:'👔',Jacket:'🧥',Knitwear:'🧶'};
    STYLES = [];
    // Data starts at row index 4 (row 5 in sheet, 0-indexed)
    for(let i=4; i<rows.length; i++){
      const r = rows[i];
      const code = (r[2]||'').trim();
      const name = (r[3]||'').trim();
      if(!code||!name||code==='STYLE NO.') continue;
      STYLES.push({
        code, name,
        factory:(r[7]||'').trim(),
        category:(r[4]||'').trim(),
        icon:ICONS[(r[4]||'').trim()]||'🧥',
        fab:(r[10]||'').trim()||null,
        fabCode:(r[11]||'').trim()||null,
        trim:(r[37]||'').trim()||null,
        trimCode:(r[38]||'').trim()||null,
      });
    }
    if(!STYLES.length) showErr('Sheet connected but no styles found. Check the Range Tracker tab.');
  }catch(e){
    showErr(`Connection error: ${e.message}`);
  }
}

function parseCSV(text){
  const rows = [];
  let row = [], cell = '', inQuote = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(c==='"'){ if(inQuote&&text[i+1]==='"'){cell+='"';i++;} else inQuote=!inQuote; }
    else if(c===','&&!inQuote){ row.push(cell); cell=''; }
    else if((c==='\n'||c==='\r')&&!inQuote){
      if(c==='\r'&&text[i+1]==='\n') i++;
      row.push(cell); rows.push(row); row=[]; cell='';
    } else cell+=c;
  }
  if(cell||row.length) { row.push(cell); rows.push(row); }
  return rows;
}

async function loadCloud(){
  const s = localStorage.getItem('charlton_bin_id');
  if(s) binId = s;
  if(binId){
    try{
      const d = await (await fetch(`${JSONBIN_URL}/${binId}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}})).json();
      if(d.record){ cloudData = d.record; return; }
    }catch(e){}
  }
  try{
    const d = await (await fetch(JSONBIN_URL,{method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'charlton-tracking'},
      body:'{}'})).json();
    if(d.metadata?.id){ binId=d.metadata.id; localStorage.setItem('charlton_bin_id',binId); cloudData={}; }
  }catch(e){ cloudData=JSON.parse(localStorage.getItem('charlton_fallback')||'{}'); }
}

async function saveCloud(){
  if(!binId){ localStorage.setItem('charlton_fallback',JSON.stringify(cloudData)); return; }
  try{
    await fetch(`${JSONBIN_URL}/${binId}`,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:JSON.stringify(cloudData)});
  }catch(e){ localStorage.setItem('charlton_fallback',JSON.stringify(cloudData)); }
}

function showErr(msg){
  document.getElementById('main-content').innerHTML=
    `<div style="background:#fff3cd;border:0.5px solid #ffc107;border-radius:10px;padding:12px;margin:12px;font-size:12px;color:#856404">${msg}</div>`;
}

const CARRIERS = {
  DHL:'https://www.dhl.com/en/express/tracking.html?AWB=',
  FedEx:'https://www.fedex.com/fedextrack/?trknbr=',
  UPS:'https://www.ups.com/track?tracknum=',
  TNT:'https://www.tnt.com/express/en_gb/site/shipping-tools/tracking.html?searchType=CON&cons=',
  'Japan Post':'https://trackings.post.japanpost.jp/services/srv/search/?requestNo=',
  'China Post':'https://track.ems.com.cn/mailQuery.do?mailNo=',
  'SF Express':'https://www.sf-express.com/en-us/dynamic_function/waybill/#search/bill-number/',
  EMS:'https://track.ems.com.cn/mailQuery.do?mailNo='
};

const SM = {
  '':       {label:'Not ordered',  cls:'pill-placeholder', progress:0,   color:'#ddd'},
  ordered:  {label:'Ordered',      cls:'pill-ordered',     progress:10,  color:'#AFA9EC'},
  transit:  {label:'In Transit',   cls:'pill-transit',     progress:55,  color:'#378ADD'},
  customs:  {label:'In Customs',   cls:'pill-customs',     progress:72,  color:'#D4537E'},
  delivery: {label:'Out for Delivery', cls:'pill-delivery',progress:88,  color:'#EF9F27'},
  delivered:{label:'Delivered',    cls:'pill-delivered',   progress:100, color:'#639922'},
};

let activeTab = 'fabric';
let activeFilter = 'all';
let currentFTKey = null;
let currentSampCode = null;

function getData(){ return cloudData; }
function setData(d){ cloudData=d; saveCloud(); }

function switchTab(tab){
  activeTab = tab;
  activeFilter = 'all';
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['fabric','trims','samples'][i]===tab);
  });
  render();
}

function setFilter(f){ activeFilter=f; render(); }

function track(carrier, num){
  const url = (CARRIERS[carrier]||'https://www.google.com/search?q=')+encodeURIComponent(num);
  window.open(url,'_blank');
}

function formatEta(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

function render(){
  const d = getData();
  const factories = [...new Set(STYLES.map(s=>s.factory))];
  const shortFactory = f => f.split(' ')[0];

  let filterHtml = `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>`;
  factories.forEach(f=>{
    filterHtml += `<button class="filter-btn ${activeFilter===f?'active':''}" onclick="setFilter('${f}')">${shortFactory(f)}</button>`;
  });

  const filtered = activeFilter==='all' ? STYLES : STYLES.filter(s=>s.factory===activeFilter);
  let html = `<div class="filter-row">${filterHtml}</div>`;

  if(activeTab === 'fabric'){
    const fabStyles = filtered.filter(s=>s.fab||s.fabCode);
    const tracked = fabStyles.filter(s=>{ const fd=d['fab__'+s.code]||{}; return fd.samp?.num||fd.bulk?.num; }).length;
    html += `<div class="section-meta">Fabric orders · ${tracked}/${fabStyles.length} tracked</div>`;
    if(!fabStyles.length){ html+=`<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">No items for this filter</div>`; }
    fabStyles.forEach(s=>{
      const fd = d['fab__'+s.code]||{};
      const samp = fd.samp||{};
      const bulk = fd.bulk||{};
      const hasAny = samp.num||bulk.num;
      const shipRow = (label,t) => {
        const sm = SM[t&&t.status?t.status:''];
        const has = t&&t.num;
        return `<div class="shipment-type">
          <div class="type-label">${label}</div>
          <div class="shipment-line">
            <div class="shipment-chip ${has?'':'empty'}">${has?t.carrier+' · '+t.num:'No tracking yet'}</div>
            <span class="pill ${sm.cls}" style="font-size:9px">${sm.label}</span>
            ${has?`<button class="btn btn-track" style="padding:3px 8px;font-size:9px" onclick="track('${t.carrier}','${t.num}')">Track</button>`:''}
          </div>
          ${has?`<div class="shipment-progress"><div class="shipment-fill" style="width:${sm.progress}%;background:${sm.color}"></div></div>
          <div class="shipment-eta">${t.eta?'ETA '+formatEta(t.eta):''}</div>`:''}
        </div>`;
      };
      html += `<div class="sample-card">
        <div class="sample-header">
          <div class="sample-icon">${s.icon}</div>
          <div class="sample-title">
            <div class="sample-name">${s.fab||'Fabric'}</div>
            <div class="sample-code">${s.fabCode||'—'} · ${s.code}</div>
            <div class="sample-factory">${s.name}</div>
          </div>
          <button class="btn btn-add" style="flex-shrink:0" onclick="openFabric('${s.code}','${(s.fab||s.code).replace(/'/g,"\\'")}')">
            ${hasAny?'Edit':'+ Add'}
          </button>
        </div>
        <div class="shipment-rows">
          ${shipRow('Sampling',samp)}
          <div class="type-divider"></div>
          ${shipRow('Bulk',bulk)}
        </div>
      </div>`;
    });

  } else if(activeTab === 'trims'){
    const trimStyles = filtered.filter(s=>s.trim||s.trimCode);
    const tracked = trimStyles.filter(s=>{ const td=d['trim__'+s.code]||{}; return td.samp?.num||td.bulk?.num; }).length;
    html += `<div class="section-meta">Trim orders · ${tracked}/${trimStyles.length} tracked</div>`;
    if(!trimStyles.length){ html+=`<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">No items for this filter</div>`; }
    trimStyles.forEach(s=>{
      const td = d['trim__'+s.code]||{};
      const samp = td.samp||{};
      const bulk = td.bulk||{};
      const hasAny = samp.num||bulk.num;
      const shipRow = (label,t) => {
        const sm = SM[t&&t.status?t.status:''];
        const has = t&&t.num;
        return `<div class="shipment-type">
          <div class="type-label">${label}</div>
          <div class="shipment-line">
            <div class="shipment-chip ${has?'':'empty'}">${has?t.carrier+' · '+t.num:'No tracking yet'}</div>
            <span class="pill ${sm.cls}" style="font-size:9px">${sm.label}</span>
            ${has?`<button class="btn btn-track" style="padding:3px 8px;font-size:9px" onclick="track('${t.carrier}','${t.num}')">Track</button>`:''}
          </div>
          ${has?`<div class="shipment-progress"><div class="shipment-fill" style="width:${sm.progress}%;background:${sm.color}"></div></div>
          <div class="shipment-eta">${t.eta?'ETA '+formatEta(t.eta):''}</div>`:''}
        </div>`;
      };
      html += `<div class="sample-card">
        <div class="sample-header">
          <div class="sample-icon">🔘</div>
          <div class="sample-title">
            <div class="sample-name">${s.trimCode||s.trim||'Trim'}</div>
            <div class="sample-code">${s.trimCode||'—'} · ${s.code}</div>
            <div class="sample-factory">${s.name}</div>
          </div>
          <button class="btn btn-add" style="flex-shrink:0" onclick="openTrim('${s.code}','${(s.trimCode||s.code).replace(/'/g,"\\'")}')">
            ${hasAny?'Edit':'+ Add'}
          </button>
        </div>
        <div class="shipment-rows">
          ${shipRow('Sampling',samp)}
          <div class="type-divider"></div>
          ${shipRow('Bulk',bulk)}
        </div>
      </div>`;
    });

  } else if(activeTab === 'samples'){
    const total = filtered.length;
    let anyTracked = filtered.filter(s=>{
      const sd = d['samp__'+s.code]||{};
      return sd.sms?.num||sd.pps?.num||sd.bulk?.num;
    }).length;
    html += `<div class="section-meta">Sample tracking · ${anyTracked}/${total} styles active</div>`;

    filtered.forEach(s=>{
      const sd = d['samp__'+s.code]||{};
      const sms = sd.sms||{};
      const pps = sd.pps||{};
      const bulk = sd.bulk||{};
      const hasAny = sms.num||pps.num||bulk.num;

      const shipRow = (label, t) => {
        const sm = t&&t.status ? SM[t.status] : SM[''];
        const hasTrack = t&&t.num;
        return `<div class="shipment-type">
          <div class="type-label">${label}</div>
          <div class="shipment-line">
            <div class="shipment-chip ${hasTrack?'':'empty'}">${hasTrack ? t.carrier+' · '+t.num : 'No tracking yet'}</div>
            <span class="pill ${sm.cls}" style="font-size:9px">${sm.label}</span>
            ${hasTrack ? `<button class="btn btn-track" style="padding:3px 8px;font-size:9px" onclick="track('${t.carrier}','${t.num}')">Track</button>` : ''}
          </div>
          ${hasTrack ? `<div class="shipment-progress"><div class="shipment-fill" style="width:${sm.progress}%;background:${sm.color}"></div></div>
          <div class="shipment-eta">${t.eta?'ETA '+formatEta(t.eta):''}</div>` : ''}
        </div>`;
      };

      html += `<div class="sample-card">
        <div class="sample-header">
          <div class="sample-icon">${s.icon}</div>
          <div class="sample-title">
            <div class="sample-name">${s.name}</div>
            <div class="sample-code">${s.code}</div>
            <div class="sample-factory">${s.factory}</div>
          </div>
          <button class="btn btn-add" style="flex-shrink:0" onclick="openSample('${s.code}','${s.name}')">${hasAny?'Edit':'+ Add'}</button>
        </div>
        <div class="shipment-rows">
          ${shipRow('SMS — Salesman Sample', sms)}
          <div class="type-divider"></div>
          ${shipRow('PPS — Pre-Production Sample', pps)}
          <div class="type-divider"></div>
          ${shipRow('Bulk Delivery', bulk)}
        </div>
      </div>`;
    });
  }

  document.getElementById('main-content').innerHTML = html;
}

/* Fabric modal */
let currentFabCode = null;
function openFabric(code, label){
  currentFabCode = code;
  const fd = getData()['fab__'+code]||{};
  document.getElementById('fab-title').textContent = 'Fabric tracking';
  document.getElementById('fab-sub').textContent = label+' · '+code;
  const fill = (p,t) => {
    document.getElementById('fab-'+p+'-carrier').value = t?.carrier||'DHL';
    document.getElementById('fab-'+p+'-track').value   = t?.num||'';
    document.getElementById('fab-'+p+'-status').value  = t?.status||'';
    document.getElementById('fab-'+p+'-eta').value     = t?.eta||'';
  };
  fill('samp', fd.samp); fill('bulk', fd.bulk);
  document.getElementById('modal-fab').classList.add('open');
}
function saveFabric(){
  const d = getData();
  const get = p => {
    const num = document.getElementById('fab-'+p+'-track').value.trim();
    const status = document.getElementById('fab-'+p+'-status').value;
    if(!num&&!status) return null;
    return { carrier:document.getElementById('fab-'+p+'-carrier').value, num, status, eta:document.getElementById('fab-'+p+'-eta').value };
  };
  d['fab__'+currentFabCode] = { samp:get('samp'), bulk:get('bulk') };
  setData(d); closeModal('modal-fab'); render();
}

  };
  d['trim__'+currentTrimCode] = { samp:get('samp'), bulk:get('bulk') };

/* Samples modal */
function openSample(code, name){
  currentSampCode = code;
  const d = getData();
  const sd = d['samp__'+code]||{};
  document.getElementById('samp-title').textContent = 'Sample tracking';
  document.getElementById('samp-sub').textContent = code+' — '+name;

  const fill = (prefix, t) => {
    document.getElementById(prefix+'-carrier').value = t?.carrier||'DHL';
    document.getElementById(prefix+'-track').value = t?.num||'';
    document.getElementById(prefix+'-status').value = t?.status||'';
    document.getElementById(prefix+'-eta').value = t?.eta||'';
  };
  fill('sms', sd.sms); fill('pps', sd.pps); fill('bulk', sd.bulk);
  document.getElementById('modal-samp').classList.add('open');
}
function saveSample(){
  const d = getData();
  const get = prefix => {
    const num = document.getElementById(prefix+'-track').value.trim();
    const status = document.getElementById(prefix+'-status').value;
    if(!num && !status) return null;
    return {
      carrier: document.getElementById(prefix+'-carrier').value,
      num, status, eta: document.getElementById(prefix+'-eta').value
    };
  };
  d['samp__'+currentSampCode] = { sms:get('sms'), pps:get('pps'), bulk:get('bulk') };
  setData(d); closeModal('modal-samp'); render();
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

init();
